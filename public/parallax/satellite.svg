<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Satellite body -->
  <rect x="24" y="22" width="16" height="20" rx="3" fill="#D8C5AD" stroke="#574495" stroke-width="1.5"/>
  <!-- Solar panel left -->
  <rect x="2" y="26" width="20" height="12" rx="1" fill="#574495" stroke="#403273" stroke-width="1"/>
  <line x1="7" y1="26" x2="7" y2="38" stroke="#403273" stroke-width="0.5"/>
  <line x1="12" y1="26" x2="12" y2="38" stroke="#403273" stroke-width="0.5"/>
  <line x1="17" y1="26" x2="17" y2="38" stroke="#403273" stroke-width="0.5"/>
  <!-- Solar panel right -->
  <rect x="42" y="26" width="20" height="12" rx="1" fill="#574495" stroke="#403273" stroke-width="1"/>
  <line x1="47" y1="26" x2="47" y2="38" stroke="#403273" stroke-width="0.5"/>
  <line x1="52" y1="26" x2="52" y2="38" stroke="#403273" stroke-width="0.5"/>
  <line x1="57" y1="26" x2="57" y2="38" stroke="#403273" stroke-width="0.5"/>
  <!-- Antenna -->
  <line x1="32" y1="22" x2="32" y2="12" stroke="#D8C5AD" stroke-width="1.5"/>
  <circle cx="32" cy="10" r="2.5" fill="#d14206"/>
  <!-- Lens/sensor -->
  <circle cx="32" cy="32" r="4" fill="#d14206" opacity="0.8"/>
  <circle cx="32" cy="32" r="2" fill="#FFD700"/>
</svg>
