<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 50" width="220" height="50">
  <!-- Engine -->
  <rect x="0" y="15" width="55" height="30" rx="4" fill="#D8C5AD" stroke="#574495" stroke-width="1.5"/>
  <!-- Chimney -->
  <rect x="8" y="5" width="10" height="12" rx="2" fill="#574495"/>
  <!-- Smoke puffs -->
  <circle cx="13" cy="3" r="4" fill="#D8C5AD" opacity="0.5"/>
  <circle cx="8" cy="-1" r="3" fill="#D8C5AD" opacity="0.3"/>
  <!-- Engine window -->
  <rect x="35" y="20" width="14" height="12" rx="2" fill="#574495" opacity="0.8"/>
  <rect x="38" y="22" width="8" height="8" rx="1" fill="#d14206" opacity="0.6"/>
  <!-- Engine wheels -->
  <circle cx="12" cy="47" r="5" fill="#403273" stroke="#574495" stroke-width="1"/>
  <circle cx="30" cy="47" r="5" fill="#403273" stroke="#574495" stroke-width="1"/>
  <circle cx="47" cy="47" r="5" fill="#403273" stroke="#574495" stroke-width="1"/>
  <!-- Connector -->
  <rect x="55" y="32" width="8" height="4" rx="1" fill="#574495"/>

  <!-- Car 1 -->
  <rect x="63" y="18" width="45" height="27" rx="3" fill="#574495" stroke="#403273" stroke-width="1"/>
  <rect x="68" y="22" width="10" height="10" rx="1" fill="#d14206" opacity="0.5"/>
  <rect x="82" y="22" width="10" height="10" rx="1" fill="#d14206" opacity="0.5"/>
  <rect x="96" y="22" width="8" height="10" rx="1" fill="#d14206" opacity="0.5"/>
  <!-- Car 1 wheels -->
  <circle cx="75" cy="47" r="5" fill="#403273" stroke="#574495" stroke-width="1"/>
  <circle cx="95" cy="47" r="5" fill="#403273" stroke="#574495" stroke-width="1"/>
  <!-- Connector -->
  <rect x="108" y="32" width="8" height="4" rx="1" fill="#574495"/>

  <!-- Car 2 -->
  <rect x="116" y="18" width="45" height="27" rx="3" fill="#574495" stroke="#403273" stroke-width="1"/>
  <rect x="121" y="22" width="10" height="10" rx="1" fill="#d14206" opacity="0.5"/>
  <rect x="135" y="22" width="10" height="10" rx="1" fill="#d14206" opacity="0.5"/>
  <rect x="149" y="22" width="8" height="10" rx="1" fill="#d14206" opacity="0.5"/>
  <!-- Car 2 wheels -->
  <circle cx="128" cy="47" r="5" fill="#403273" stroke="#574495" stroke-width="1"/>
  <circle cx="148" cy="47" r="5" fill="#403273" stroke="#574495" stroke-width="1"/>

  <!-- Headlight -->
  <circle cx="3" cy="28" r="3" fill="#FFD700" opacity="0.9"/>
</svg>
